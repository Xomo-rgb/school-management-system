{% extends "teacher_base.html" %}
{% block title %}View Results{% endblock %}
{% block header_title %}View Results{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">

    <!-- Filters -->
    <div class="bg-white rounded-2xl shadow p-6 mb-6">
        <h3 class="text-base font-semibold text-gray-700 mb-4">Filter Results</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Class</label>
                <select id="class_select" class="w-full rounded-md border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500">
                    <option value="">-- Select Class --</option>
                    {% for assignment in assignments %}
                    <option value="{{ assignment.class_name }}">{{ assignment.class_name | title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Academic Year</label>
                <select id="year_select" class="w-full rounded-md border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500">
                    <option value="">-- Select Year --</option>
                    {% for period in all_periods %}
                    <option value="{{ period.year }}" {% if period.year == current_period.year %}selected{% endif %}>
                        {{ period.year }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Term</label>
                <select id="term_select" class="w-full rounded-md border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500">
                    <option value="">-- Select Term --</option>
                    <option value="Term 1" {% if current_period.term == 'Term 1' %}selected{% endif %}>Term 1</option>
                    <option value="Term 2" {% if current_period.term == 'Term 2' %}selected{% endif %}>Term 2</option>
                    <option value="Term 3" {% if current_period.term == 'Term 3' %}selected{% endif %}>Term 3</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Subject (Optional)</label>
                <select id="subject_select" class="w-full rounded-md border-gray-300 shadow-sm focus:border-cyan-500 focus:ring-cyan-500">
                    <option value="">All Subjects</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Results Table -->
    <div id="results_section" class="hidden">
        <div class="bg-white rounded-2xl shadow overflow-hidden">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between p-5 border-b border-gray-100">
                <div>
                    <h3 class="text-base font-semibold text-gray-800" id="results_title">Results</h3>
                    <div id="summary" class="text-sm text-gray-500 mt-1"></div>
                </div>
                <div class="flex flex-wrap gap-2">
                    <form method="POST" action="{{ url_for('teacher.view_results_pdf') }}" id="teacher_pdf_form" class="inline-flex">
                        <input type="hidden" name="class_name" id="teacher_pdf_class_name">
                        <input type="hidden" name="term" id="teacher_pdf_term">
                        <input type="hidden" name="academic_year" id="teacher_pdf_academic_year">
                        <input type="hidden" name="subject_filter" id="teacher_pdf_subject_filter">
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">Download PDF</button>
                    </form>
                    <form method="POST" action="{{ url_for('teacher.view_results_csv') }}" id="teacher_csv_form" class="inline-flex">
                        <input type="hidden" name="class_name" id="teacher_csv_class_name">
                        <input type="hidden" name="term" id="teacher_csv_term">
                        <input type="hidden" name="academic_year" id="teacher_csv_academic_year">
                        <input type="hidden" name="subject_filter" id="teacher_csv_subject_filter">
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-gray-800 rounded-md hover:bg-gray-900">Download CSV</button>
                    </form>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm" id="results_table">
                    <thead class="bg-gray-50" id="results_thead"></thead>
                    <tbody class="divide-y divide-gray-100" id="results_tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="loading" class="hidden text-center py-8 text-gray-400">Loading results...</div>
    <div id="no_results" class="hidden bg-white rounded-2xl shadow p-8 text-center text-gray-400">
        No results found for the selected filters.
    </div>
</div>

<script>
    const classSelect = document.getElementById('class_select');
    const yearSelect = document.getElementById('year_select');
    const termSelect = document.getElementById('term_select');
    const subjectSelect = document.getElementById('subject_select');
    const classSubjectMap = {{ assignments|tojson }};

    function updateSubjectOptions() {
        const className = classSelect.value;
        const selectedAssignment = classSubjectMap.find(a => a.class_name === className) || {};
        const subjects = selectedAssignment.subjects || [];

        subjectSelect.innerHTML = '<option value="">All Subjects</option>';
        subjects.forEach(subject => {
            const option = document.createElement('option');
            option.value = subject;
            option.textContent = subject;
            subjectSelect.appendChild(option);
        });
    }

    function loadResults() {
        const className = classSelect.value;
        const year = yearSelect.value;
        const term = termSelect.value;
        const subjectFilter = subjectSelect.value;

        if (!className || !year || !term) return;

        document.getElementById('results_section').classList.add('hidden');
        document.getElementById('no_results').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');

        const formData = new FormData();
        formData.append('class_name', className);
        formData.append('academic_year', year);
        formData.append('term', term);
        formData.append('subject_filter', subjectFilter);

        fetch("{{ url_for('teacher.get_class_results') }}", { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').classList.add('hidden');

                if (data.length === 0) {
                    document.getElementById('no_results').classList.remove('hidden');
                    return;
                }

                // Get all unique subjects
                const subjects = [...new Set(data.flatMap(s => s.subjects.map(r => r.subject)))].sort();

                // Build header
                document.getElementById('results_thead').innerHTML = `
                    <tr>
                        <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase">Student</th>
                        ${subjects.map(s => `<th class="px-4 py-3 text-center font-medium text-gray-500 uppercase text-xs">${s}</th>`).join('')}
                        <th class="px-4 py-3 text-center font-medium text-gray-500 uppercase">Average</th>
                        <th class="px-4 py-3 text-center font-medium text-gray-500 uppercase">Status</th>
                    </tr>`;

                // Build rows
                document.getElementById('results_tbody').innerHTML = data.map(student => {
                    const scoreMap = {};
                    student.subjects.forEach(r => scoreMap[r.subject] = r.score);

                    const subjectCells = subjects.map(s =>
                        `<td class="px-4 py-3 text-center text-gray-700">${scoreMap[s] !== undefined ? scoreMap[s] : '<span class="text-gray-300">—</span>'}</td>`
                    ).join('');

                    const avgCell = student.average !== null
                        ? `<td class="px-4 py-3 text-center font-semibold ${student.passed ? 'text-green-600' : 'text-red-600'}">${student.average}%</td>`
                        : `<td class="px-4 py-3 text-center text-gray-300">—</td>`;

                    const statusCell = student.passed === null
                        ? `<td class="px-4 py-3 text-center"><span class="px-2 py-1 bg-gray-100 text-gray-500 text-xs rounded-full">No Data</span></td>`
                        : student.passed
                        ? `<td class="px-4 py-3 text-center"><span class="px-2 py-1 bg-green-100 text-green-700 text-xs font-semibold rounded-full">Passed</span></td>`
                        : `<td class="px-4 py-3 text-center"><span class="px-2 py-1 bg-red-100 text-red-700 text-xs font-semibold rounded-full">Failed</span></td>`;

                    return `<tr class="hover:bg-gray-50">
                        <td class="px-4 py-3">
                            <p class="font-medium text-gray-800">${student.name}</p>
                            <p class="text-xs text-gray-400">${student.student_number}</p>
                        </td>
                        ${subjectCells}${avgCell}${statusCell}
                    </tr>`;
                }).join('');

                // Summary
                const passed = data.filter(s => s.passed === true).length;
                const failed = data.filter(s => s.passed === false).length;
                const noData = data.filter(s => s.passed === null).length;
                document.getElementById('summary').textContent =
                    `${data.length} students | ${passed} passed | ${failed} failed | ${noData} no data`;

                document.getElementById('results_title').textContent =
                    `${className.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')} — ${term}, ${year}`;

                document.getElementById('teacher_pdf_class_name').value = className;
                document.getElementById('teacher_pdf_term').value = term;
                document.getElementById('teacher_pdf_academic_year').value = year;
                document.getElementById('teacher_pdf_subject_filter').value = subjectFilter;
                document.getElementById('teacher_csv_class_name').value = className;
                document.getElementById('teacher_csv_term').value = term;
                document.getElementById('teacher_csv_academic_year').value = year;
                document.getElementById('teacher_csv_subject_filter').value = subjectFilter;
                document.getElementById('results_section').classList.remove('hidden');
            });
    }

    classSelect.addEventListener('change', () => {
        updateSubjectOptions();
        loadResults();
    });
    yearSelect.addEventListener('change', loadResults);
    termSelect.addEventListener('change', loadResults);
    subjectSelect.addEventListener('change', loadResults);

    // Initialize subject list if a class is already selected
    updateSubjectOptions();
</script>
{% endblock %}
